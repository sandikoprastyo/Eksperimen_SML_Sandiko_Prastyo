global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: 'model_serving'
    scrape_interval: 10s
    static_configs:
      - targets: ['model-serving:8000']
    metrics_path: '/metrics'

  - job_name: 'prometheus_exporter'
    scrape_interval: 10s
    static_configs:
      - targets: ['prometheus-exporter:8001']
    metrics_path: '/metrics'
